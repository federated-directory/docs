name: VitePress Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Fetch latest swagger.json from API
        run: |
          curl -f -s -o docs/public/swagger.json https://api.federated.directory/swagger.json
          echo "swagger.json updated successfully"

      - run: npm ci

      - run: npm run docs:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - uses: actions/deploy-pages@v4
